<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git hub tracker</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">


    <!-- Deisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

</head>

<body>

    <section id="login" class="">
        <div class="login-form ">

            <fieldset
                class="mt-10 fieldset bg-base-200 border-base-300 rounded-box border p-6 md:p-10 w-full max-w-sm md:max-w-md mx-auto shadow-xl">

                <div class="logo mb-5 flex flex-col text-center">
                    <img class=" mb-5 mx-auto w-[40%]" src="./assets/github-logo.png" alt="">
                    <h2 class=" font-bold text-2xl">GitHub Issues Tracker</h2>
                    <p>Sign in to manage your issues</p>
                </div>

                <label class="label font-semibold">Email / Username</label>
                <input id="input-email" type="email" class="input input-bordered w-full" placeholder="Enter email" />
                <p class="text-xs text-gray-500 mt-1 ml-1">
                    <span class="font-bold">Credential:</span> admin
                </p>

                <label class="label font-semibold mt-4">Password</label>
                <input id="input-password" type="password" class="input input-bordered w-full"
                    placeholder="Enter password" />
                <p class="text-xs text-gray-500 mt-1 ml-1">
                    <span class="font-bold">Credential:</span> admin123
                </p>
                <button onclick="signin()" id="btn-signin" class="btn btn-neutral mt-8 w-full">Sign In</button>
            </fieldset>
        </div>
    </section>

    

    <script src="./login.js"></script>
    <script src="./login.js"></script>
</body>

</html>
