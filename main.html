<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">



    <!-- Deisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />


    <!-- Font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <section class="border-b-2 border-gray-100 pb-4">
        <header class="  mx-auto w-[90%] pt-10">
            <div class="flex flex-col md:flex-row md:justify-between items-center gap-4">
                <div class="flex justify-between gap-2 items-center">
                    <img src="./assets/github-logo.png" class=" h-8 w-8 ">
                    <h1>GitHub Issues Tracker</h1>
                </div>

                <div class=" flex justify-between space-x-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-input" type="search" class="grow" placeholder="Search issues.." />
                    </label>
                    <button onclick="search()" class="btn btn-primary">+ New Issue</button>
                </div>
        </header>
    </section>

    <!-- Nave bar -->
    <section id="nav" class="mt-6 shadow-sm mx-auto w-[90%] p-2 border border-base-300 rounded-lg">
        <div class="flex justify-between items-center w-full">

            <ul class="flex  flex-row items-center gap-6 list-none">
                <button id="all"  onclick=" filterByStatus('all')"
                    class="btn active section hover:btn-primary cursor-pointer font-medium">All</button>
                <button id="open" onclick=" filterByStatus('open')"
                    class="btn section hover:btn-primary cursor-pointer font-medium">Open</button>
                <button id="closed" onclick=" filterByStatus('closed')"
                    class="btn section hover:btn-primary cursor-pointer font-medium">Closed</button>
            </ul>

        </div>
    </section>

    <!-- head section -->
    <section
        class="flex flex-col md:flex-row justify-between items-center mt-6 mx-auto w-[90%] p-2 border-b-2 border-gray-100 rounded-lg gap-4">

        <div class="flex gap-4 items-center">
            <img class="w-10 h-10" src="./assets/Aperture.png" alt="Logo">
            <div>
                <h3 class="font-bold text-xl leading-tight"><span id="issues">50</span> Issues</h3>
                <p class="text-sm opacity-70">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-green-500"></span>
                <span class="text-sm font-semibold">Open</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-purple-500"></span>
                <span class="text-sm font-semibold">Closed</span>
            </div>
        </div>

    </section>

    <!-- cards -->
    <section id="cards-body"
        class="flex flex-col md:flex-row justify-between items-center mt-6 mx-auto w-[90%] p-2 border-b-2 border-gray-100 rounded-lg gap-4">

        <div id="issue-container" class="main grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full">

        </div>
    </section>

    <!-- modal -->
    <section>
        <button class="btn" onclick="modalPopup()"></button>
        <dialog id="my_modal_1" class="modal">
            <div class="modal-box">
                <h3 class="text-lg font-bold">Hello!</h3>
                <p class="py-4">Press ESC key or click the button below to close</p>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>

    <section id="loading" class="flex justify-center items-center py-10 hidden">
        <span class="loading loading-spinner loading-xl"></span>
    </section>

    <script src="./script.js"></script>
</body>

</html>
