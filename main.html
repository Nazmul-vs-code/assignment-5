<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">



    <!-- Deisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />


    <!-- Font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <section class="border-b-2 border-gray-100 pb-4">
        <header class="  mx-auto w-[90%] pt-10">
            <div class="flex flex-col md:flex-row md:justify-between items-center gap-4">
                <div class="flex justify-between gap-2 items-center">
                    <img src="./assets/github-logo.png" class=" h-8 w-8 ">
                    <h1>GitHub Issues Tracker</h1>
                </div>

                <div class=" flex justify-between space-x-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" class="grow" placeholder="Search issues.." />
                    </label>
                    <button class="btn btn-primary">+ New Issue</button>
                </div>
        </header>
    </section>

    <!-- Nave bar -->
    <section id="nav" class="mt-6 shadow-sm mx-auto w-[90%] p-2 border border-base-300 rounded-lg">
        <div class="flex justify-between items-center w-full">

            <ul class="flex flex-row items-center gap-6 list-none">
                <li class="btn hover:btn-primary cursor-pointer font-medium"><a>All</a></li>
                <li class="btn hover:btn-primary cursor-pointer font-medium"><a>Open</a></li>
                <li class="btn hover:btn-primary cursor-pointer font-medium"><a>Closed</a></li>
            </ul>


        </div>
    </section>

    <!-- head section -->
    <section
        class="flex flex-col md:flex-row justify-between items-center mt-6 mx-auto w-[90%] p-2 border-b-2 border-gray-100 rounded-lg gap-4">

        <div class="flex gap-4 items-center">
            <img class="w-10 h-10" src="./assets/Aperture.png" alt="Logo">
            <div>
                <h3 class="font-bold text-xl leading-tight">50 Issues</h3>
                <p class="text-sm opacity-70">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-green-500"></span>
                <span class="text-sm font-semibold">Open</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-purple-500"></span>
                <span class="text-sm font-semibold">Closed</span>
            </div>
        </div>

    </section>

    <!-- cards -->
    <section
        class="flex flex-col md:flex-row justify-between items-center mt-6 mx-auto w-[90%] p-2 border-b-2 border-gray-100 rounded-lg gap-4">

        <div class="main grid grid-cols-4 ">
            <div class="card space-y-8 border border-gray-200 shadow-md">
                <div class="status">
                    <span class="btn rounded-full">High</span>
                </div>
                <div class="card-content  space-y-4">
                    <div class="">
                        <h3 class="font-bold">Fix navigation menu on mobile devices</h3>
                        <p class=" text-gray-500 text-[80%]">The navigation menu doesn't collapse properly on mobile devices...</p>
                    </div>
                    <div class="issues">
                        <button class="btn text-red-500 btn-outline btn-error hover:text-white rounded-full"><i class="fa-solid fa-bug"></i></i> Bug</button>
                        <button class="btn rounded-full"><i class="fa-solid fa-handshake-angle"></i>help wanted</button>
                    </div>
                    <hr class=" border-gray-300">
                    <div class="extension">
                        <p>#1 by john_doe</p>
                        <p>1/15/2024</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
